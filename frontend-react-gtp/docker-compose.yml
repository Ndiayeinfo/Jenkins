services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://host.docker.internal:8000
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

